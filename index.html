<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FORGE — Hybrid Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  /* ── Tokens ── */
  :root {
    --bg:          #0d0d0d;
    --surface:     #141414;
    --surface-2:   #1a1a1a;
    --border:      rgba(255,255,255,0.07);
    --text:        #f0f0f0;
    --muted:       #666;
    --subtle:      #333;

    --yellow:  #f5c518;
    --blue:    #47b8ff;
    --rose:    #fb7185;
    --orange:  #fb923c;
    --green:   #4ade80;
    --pink:    #f472b6;
    --mint:    #6ee7b7;

    --font-display: 'Bebas Neue', sans-serif;
    --font-body:    'DM Sans', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;

    --radius: 12px;
    --radius-sm: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ── */
  header {
    padding: 52px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-inner {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo-block h1 {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 88px);
    line-height: 0.9;
    letter-spacing: 0.01em;
    color: var(--text);
  }

  .logo-block h1 span {
    color: var(--yellow);
  }

  .logo-block .tagline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .header-stats {
    display: flex;
    gap: 32px;
    padding-bottom: 6px;
  }

  .stat-item {
    text-align: right;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--yellow);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  /* ── Week selector ── */
  .week-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .week-bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
    margin-right: 4px;
  }

  .week-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .week-pill {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.08em;
  }

  .week-pill:hover {
    border-color: var(--yellow);
    color: var(--yellow);
  }

  .week-pill.active {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #000;
    font-weight: 600;
  }

  /* ── Day Grid ── */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    margin-bottom: 48px;
  }

  @media (max-width: 900px) {
    .day-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  @media (max-width: 560px) {
    .day-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* ── Day Card ── */
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    min-height: 220px;
  }

  .day-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent);
    opacity: 0.9;
  }

  .day-card::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: var(--card-accent);
    opacity: 0.04;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .day-card:hover {
    transform: translateY(-3px);
    border-color: var(--card-accent);
    background: var(--surface-2);
  }

  .day-card:hover::after {
    opacity: 0.09;
    transform: scale(1.2);
  }

  .day-card.run-card {
    opacity: 0.75;
  }

  .day-card.run-card:hover {
    opacity: 1;
  }

  .day-card.rest-card {
    cursor: default;
    opacity: 0.4;
  }

  .day-card.rest-card:hover {
    transform: none;
    border-color: var(--border);
    background: var(--surface);
  }

  /* Card header */
  .card-day-name {
    font-family: var(--font-display);
    font-size: 32px;
    line-height: 1;
    color: var(--text);
  }

  .card-day-name span {
    color: var(--card-accent);
  }

  .card-session-type {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--card-accent);
    background: color-mix(in srgb, var(--card-accent) 12%, transparent);
    padding: 3px 8px;
    border-radius: 100px;
    display: inline-block;
    border: 1px solid color-mix(in srgb, var(--card-accent) 25%, transparent);
  }

  /* Exercise list */
  .card-exercises {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .card-ex-item {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1.4;
  }

  .card-ex-item::before {
    content: '';
    display: block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--card-accent);
    opacity: 0.5;
    flex-shrink: 0;
  }

  .card-ex-item.anchor-ex::before {
    opacity: 1;
  }

  .card-ex-more {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    margin-top: 2px;
    padding-left: 10px;
  }

  /* Run card specifics */
  .run-zones {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .run-zone-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .run-zone-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .run-zone-hr {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--card-accent);
    font-weight: 600;
  }

  .run-distance {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--card-accent);
    line-height: 1;
    margin-top: auto;
  }

  .run-distance-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Built badge */
  .built-badge {
    position: absolute;
    top: 14px; right: 14px;
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: color-mix(in srgb, var(--card-accent) 15%, transparent);
    color: var(--card-accent);
    border: 1px solid color-mix(in srgb, var(--card-accent) 30%, transparent);
    padding: 2px 7px;
    border-radius: 100px;
  }

  /* ── Weekly Overview Strip ── */
  .section-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* ── Volume Summary ── */
  .volume-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 48px;
  }

  .volume-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }

  .volume-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .volume-bar-wrap {
    background: var(--surface-2);
    border-radius: 100px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .volume-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--bar-color);
    width: var(--bar-pct);
    transition: width 1s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .volume-numbers {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .volume-current {
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--text);
    line-height: 1;
  }

  .volume-target {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
  }

  .volume-gap {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--orange);
    margin-top: 4px;
  }

  /* ── Block Progress ── */
  .block-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    margin-bottom: 48px;
  }

  .block-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .block-title {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--text);
    line-height: 1;
  }

  .block-subtitle {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .block-week-indicator {
    font-family: var(--font-display);
    font-size: 48px;
    color: var(--yellow);
    line-height: 1;
    text-align: right;
  }

  .block-week-indicator span {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    text-align: right;
    margin-top: 2px;
  }

  .week-track {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .week-node {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    transition: all 0.15s ease;
  }

  .week-node.active {
    background: color-mix(in srgb, var(--yellow) 12%, transparent);
    border-color: var(--yellow);
  }

  .week-node.completed {
    background: color-mix(in srgb, var(--green) 8%, transparent);
    border-color: color-mix(in srgb, var(--green) 30%, transparent);
  }

  .week-node-label {
    font-family: var(--font-display);
    font-size: 22px;
    line-height: 1;
    color: var(--muted);
  }

  .week-node.active .week-node-label {
    color: var(--yellow);
  }

  .week-node.completed .week-node-label {
    color: var(--green);
  }

  .week-node-sub {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--subtle);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .week-node.active .week-node-sub {
    color: var(--yellow);
  }

  .week-node.completed .week-node-sub {
    color: var(--green);
    opacity: 0.6;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-left {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    letter-spacing: 0.1em;
  }

  .footer-right {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--subtle);
    letter-spacing: 0.1em;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .day-card {
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
  }

  .day-card:nth-child(1) { animation-delay: 0.05s; }
  .day-card:nth-child(2) { animation-delay: 0.10s; }
  .day-card:nth-child(3) { animation-delay: 0.15s; }
  .day-card:nth-child(4) { animation-delay: 0.20s; }
  .day-card:nth-child(5) { animation-delay: 0.25s; }
  .day-card:nth-child(6) { animation-delay: 0.30s; }
  .day-card:nth-child(7) { animation-delay: 0.35s; }

  .volume-card, .block-progress {
    opacity: 0;
    animation: fadeUp 0.4s ease forwards;
    animation-delay: 0.45s;
  }

  /* ── Today highlight ── */
  .today-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--card-accent);
    margin-left: 6px;
    vertical-align: middle;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
</style>
</head>

/* ── Today ── */
const TODAY_INDEX = new Date().getDay(); // 0=Sun, 1=Mon, ...6=Sat
const DAY_MAP = [6, 0, 1, 2, 3, 4, 5]; // Maps JS day to our array index
const todayCardIndex = DAY_MAP[TODAY_INDEX];

/* ── Render Day Grid ── */
function renderDayGrid() {
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';

  DAYS.forEach((day, i) => {
    const isToday = i === todayCardIndex;
    const isRun = day.type === 'run';

    const card = document.createElement(day.href && day.built ? 'a' : 'div');
    card.style.setProperty('--card-accent', day.accent);

    const classes = ['day-card'];
    if (isRun) classes.push('run-card');
    card.className = classes.join(' ');

    if (day.built && day.href) {
      card.href = day.href;
    }

    // Built badge
    if (day.built) {
      card.innerHTML += `<div class="built-badge">✓ Live</div>`;
    }

    // Day name
    card.innerHTML += `
      <div class="card-day-name">
        <span>${day.short}</span>${day.rest}${isToday ? `<span class="today-dot"></span>` : ''}
      </div>
      <div class="card-session-type">${day.session}</div>
    `;

    // Content
    if (isRun) {
      let zonesHTML = day.zones.map(z => `
        <div class="run-zone-row">
          <div class="run-zone-label">${z.label}</div>
          <div class="run-zone-hr">${z.hr} bpm</div>
        </div>
      `).join('');
      card.innerHTML += `
        <div class="run-zones">
          ${zonesHTML}
        </div>
        <div>
          <div class="run-distance">${day.distance}</div>
          <div class="run-distance-label">Target Distance</div>
        </div>
      `;
    } else {
      const anchors = day.exercises.filter(e => e.anchor);
      const flex = day.exercises.filter(e => !e.anchor);
      const showCount = 4;
      const shown = [...anchors, ...flex].slice(0, showCount);
      const remaining = day.exercises.length - showCount;

      let exHTML = shown.map(e => `
        <div class="card-ex-item ${e.anchor ? 'anchor-ex' : ''}">${e.name}</div>
      `).join('');

      if (remaining > 0) {
        exHTML += `<div class="card-ex-more">+${remaining} more</div>`;
      }

      card.innerHTML += `<div class="card-exercises">${exHTML}</div>`;
    }

    grid.appendChild(card);
  });
}

/* ── Week Selector ── */
let currentWeek = 2;

function renderWeekPills() {
  document.querySelectorAll('.week-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      currentWeek = parseInt(btn.dataset.week);
      document.querySelectorAll('.week-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('current-week-display').innerHTML =
        `${currentWeek}<span>Current Week</span>`;
      renderWeekTrack();
    });
  });
}

/* ── Block Progress ── */
function renderWeekTrack() {
  const track = document.getElementById('week-track');
  track.innerHTML = '';
  for (let w = 1; w <= 7; w++) {
    const isDeload = w === 7;
    const node = document.createElement('div');
    node.className = 'week-node' + (w < currentWeek ? ' completed' : '') + (w === currentWeek ? ' active' : '');
    node.innerHTML = `
      <div class="week-node-label">${isDeload ? 'DL' : `WK ${w}`}</div>
      <div class="week-node-sub">${w < currentWeek ? '✓ Done' : w === currentWeek ? 'Active' : isDeload ? 'Deload' : 'Upcoming'}</div>
    `;
    track.appendChild(node);
  }
}

/* ── Footer timestamp ── */
function updateTimestamp() {
  const el = document.getElementById('last-updated');
  const now = new Date();
  el.textContent = `Updated ${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
}

/* ── Init ── */
renderDayGrid();
renderWeekPills();
renderWeekTrack();
updateTimestamp();
</script>
</body>
</html>

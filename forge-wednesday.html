<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORGE — PUSH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0d;--surface:#141414;--surface-2:#1a1a1a;
  --border:rgba(255,255,255,0.07);--text:#f0f0f0;--muted:#666;--subtle:#333;
  --accent:#f5c518;--accent-rgb:245,197,24;
  --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;--radius:12px;--radius-sm:6px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:18px;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;padding-bottom:60px;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.03;pointer-events:none;z-index:0;}
.page-wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 16px;}

/* Week bar */
.week-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;position:sticky;top:0;z-index:50;}
.week-pills{display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;}
.week-pills::-webkit-scrollbar{display:none;}
.week-pill-dash{font-family:var(--font-mono);font-size:13px;letter-spacing:0.06em;color:var(--muted);text-decoration:none;padding:4px 8px;border-radius:4px;white-space:nowrap;}
.week-pill-dash:hover{color:var(--text);}
.week-divider{width:1px;height:16px;background:var(--border);flex-shrink:0;}
.week-pill{font-family:var(--font-mono);font-size:13px;letter-spacing:0.06em;background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;padding:3px 8px;white-space:nowrap;transition:all 0.15s;}
.week-pill:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.week-pill.active{background:var(--accent);color:#0d0d0d;border-color:var(--accent);font-weight:700;}

/* Back link */
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;letter-spacing:0.06em;color:var(--muted);text-decoration:none;margin:20px 0 12px;transition:color 0.15s;}
.back-link:hover{color:var(--text);}

/* Header */
.page-header{margin-bottom:24px;}
.session-tag{font-family:var(--font-mono);font-size:13px;letter-spacing:0.1em;color:var(--accent);margin-bottom:8px;}
.page-title{font-family:var(--font-display);font-size:clamp(52px,10vw,80px);line-height:0.9;color:var(--text);}
.page-title span{color:var(--accent);}
.goal-tag{font-family:var(--font-mono);font-size:14px;color:var(--muted);margin-top:8px;}

/* Day strip */
.day-strip-wrap{margin-bottom:28px;overflow-x:auto;scrollbar-width:none;}
.day-strip-wrap::-webkit-scrollbar{display:none;}
.day-strip{display:flex;gap:4px;}
.day-strip-pill{font-family:var(--font-mono);font-size:13px;letter-spacing:0.06em;padding:5px 10px;border-radius:4px;border:1px solid var(--border);color:var(--muted);text-decoration:none;white-space:nowrap;transition:all 0.15s;}
.day-strip-pill:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.day-strip-pill.current{background:var(--accent);color:#0d0d0d;border-color:var(--accent);pointer-events:none;}

/* Zones */
.zone-label{font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;color:var(--subtle);margin-bottom:10px;padding-left:2px;}
#anchor-zone{margin-bottom:24px;}
#flex-zone{margin-bottom:16px;}

/* Superset block */
.ss-block{margin-bottom:16px;}
.ss-block-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-left:2px;}
.ss-block-label{font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;color:var(--accent);}
.ss-block-meta{font-family:var(--font-mono);font-size:12px;color:var(--subtle);}
.ss-block-line{flex:1;height:1px;background:var(--border);}

/* Exercise card */
.exercise-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;position:relative;transition:opacity 0.2s,border-color 0.2s;}
.exercise-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.anchor-card::before{background:var(--accent);}
.flex-card::before{background:rgba(var(--accent-rgb),0.22);}



/* Collapsed state */
.exercise-card.collapsed .card-inner{display:none;}
.exercise-card.collapsed .collapse-row{display:flex;}
.collapse-row{display:none;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:12px;}
.collapse-left .type-label{font-size:11px;margin-bottom:2px;}
.collapse-name{font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--text);}
.collapse-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.collapse-summary-text{font-family:var(--font-mono);font-size:13px;color:var(--muted);}
.collapse-check{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,border-color 0.2s,color 0.2s;}
  .collapse-check.done{background:rgba(74,222,128,0.15);border-color:rgba(74,222,128,0.3);color:#4ade80;}

/* Drag handle */



.anchor-card 

/* Progress bar */
.card-progress{height:2px;background:rgba(255,255,255,0.05);border-radius:1px;margin:0 0 0;}
.card-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s;}

/* Card inner */
.card-inner{padding:12px 14px 14px;}

/* Card header */
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.header-left{flex:1;min-width:0;}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.type-label{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;margin-bottom:3px;}
.anchor-card .type-label{color:var(--accent);}
.flex-card .type-label{color:var(--muted);}
.ex-name{font-size:17px;font-weight:600;color:var(--text);line-height:1.2;}

/* Position buttons */
.pos-btns{display:flex;gap:3px;}
.pos-btn{width:20px;height:18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all 0.15s;user-select:none;touch-action:manipulation;}
.pos-btn:hover,.pos-btn:active{color:var(--accent);border-color:rgba(var(--accent-rgb),0.4);}

/* Position picker popup */
.pos-picker{position:absolute;right:0;top:36px;background:#111;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:4px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.6);}
.picker-label{font-family:var(--font-mono);font-size:11px;color:var(--subtle);white-space:nowrap;}
.picker-pill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:var(--muted);font-size:12px;font-family:var(--font-mono);padding:2px 6px;cursor:pointer;transition:all 0.1s;}
.picker-pill:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),0.4);}
.picker-pill.current{background:rgba(var(--accent-rgb),0.15);color:var(--accent);border-color:rgba(var(--accent-rgb),0.35);}

/* Swap button */
.swap-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--muted);font-size:15px;padding:2px 6px;cursor:pointer;transition:all 0.15s;}
.swap-btn:hover{color:var(--accent);border-color:rgba(var(--accent-rgb),0.4);}

/* Muscle tags */
.muscle-tags{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;}
.muscle-tag{font-family:var(--font-mono);font-size:11px;padding:2px 6px;border-radius:3px;border:0.5px solid;}
.muscle-tag.primary{background:rgba(var(--accent-rgb),0.1);color:var(--accent);border-color:rgba(var(--accent-rgb),0.25);}
.muscle-tag.secondary{background:rgba(255,255,255,0.03);color:var(--muted);border-color:var(--border);}

/* Cue */
.cue{font-size:14px;color:#555;font-style:italic;margin-bottom:10px;line-height:1.4;}

/* Tempo badge */
.tempo-badge{font-family:var(--font-mono);font-size:12px;color:var(--accent);background:rgba(var(--accent-rgb),0.08);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:4px;padding:3px 8px;display:inline-block;margin-bottom:8px;}

/* Weight row */
.weight-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.weight-label{font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:0.06em;}
.weight-input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:5px;color:var(--text);font-family:var(--font-mono);font-size:15px;padding:4px 8px;width:72px;text-align:center;transition:border-color 0.15s;}
.weight-input:focus{outline:none;border-color:rgba(var(--accent-rgb),0.4);}
.weight-input::placeholder{color:var(--subtle);}
.mark-all-btn{margin-left:auto;font-family:var(--font-mono);font-size:12px;letter-spacing:0.06em;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--muted);padding:4px 10px;cursor:pointer;transition:all 0.15s;}
.mark-all-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}

/* Sets grid */
.sets-grid{display:grid;gap:4px;}
.set-header{font-family:var(--font-mono);font-size:11px;color:var(--subtle);letter-spacing:0.05em;padding:0 2px 2px;}
.set-row{display:grid;grid-template-columns:18px 1fr 26px;gap:6px;align-items:center;}
.set-num,.set-num-lbl{font-family:var(--font-mono);font-size:13px;color:var(--subtle);text-align:center;}
.set-reps-lbl{font-family:var(--font-mono);font-size:11px;color:var(--subtle);}
.set-dot-lbl{font-family:var(--font-mono);font-size:11px;color:var(--subtle);text-align:center;}

/* Rep input — MERGED field */
.rep-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text);font-family:var(--font-mono);font-size:14px;padding:4px 6px;text-align:center;width:100%;transition:border-color 0.15s,color 0.15s;-moz-appearance:textfield;}
.rep-input::-webkit-inner-spin-button,.rep-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
.rep-input::placeholder{color:var(--subtle);}
.rep-input:focus{outline:none;border-color:rgba(var(--accent-rgb),0.35);}
.rep-input.logged{color:#4ade80;border-color:rgba(74,222,128,0.35);}
.rep-input.autofilled{color:#2e2e2e;}

/* Set dot */
.set-dot{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);background:none;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;padding:0;}
.set-dot:hover{border-color:rgba(var(--accent-rgb),0.4);}
.set-dot.done{background:var(--accent);border-color:var(--accent);}
.set-dot.done::after{content:'';width:6px;height:6px;background:#0d0d0d;border-radius:50%;display:block;}

/* Swap drawer */
.swap-drawer{display:none;position:absolute;right:0;top:calc(100% + 6px);z-index:30;background:var(--surface-2);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);min-width:260px;max-width:92vw;box-shadow:0 8px 24px rgba(0,0,0,0.55);padding:8px;}
.swap-drawer.open{display:block;}
.swap-drawer-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.07em;margin-bottom:8px;padding:4px 4px 8px;border-bottom:1px solid var(--border);}
.swap-options{display:flex;flex-wrap:wrap;gap:5px;}
.swap-option{font-family:var(--font-mono);font-size:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--muted);padding:4px 10px;cursor:pointer;transition:all 0.15s;}
.swap-option:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
.swap-option.active{background:rgba(var(--accent-rgb),0.12);color:var(--accent);border-color:rgba(var(--accent-rgb),0.3);}

/* Rest timer overlay */
#rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 0.25s;}
#rest-overlay.show{opacity:1;pointer-events:all;}
#rest-label{font-family:var(--font-mono);font-size:50px;font-weight:600;color:var(--text);margin-top:12px;}
.rest-ring{transform:rotate(-90deg);}
#rest-circle{stroke:var(--accent);stroke-width:4;fill:none;stroke-dasharray:553;stroke-dashoffset:0;transition:stroke-dashoffset 0.9s linear;}
.rest-bg-ring{stroke:rgba(255,255,255,0.06);stroke-width:4;fill:none;}
.rest-controls{display:flex;gap:12px;margin-top:16px;}
.rest-ctrl-btn{font-family:var(--font-mono);font-size:14px;letter-spacing:0.06em;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:var(--text);padding:8px 18px;cursor:pointer;transition:all 0.15s;}
.rest-ctrl-btn:hover{background:rgba(255,255,255,0.12);}
#rest-skip{background:rgba(var(--accent-rgb),0.15);border-color:rgba(var(--accent-rgb),0.3);color:var(--accent);}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:var(--font-mono);font-size:13px;color:var(--muted);padding:8px 16px;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:600;white-space:nowrap;}
#toast.show{opacity:1;}

/* Reset link */
.reset-link-wrap{text-align:center;margin-top:32px;padding-bottom:8px;}
.reset-link{font-family:var(--font-mono);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--subtle);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;transition:color 0.15s;padding:0;}
.reset-link:hover{color:var(--muted);}


  /* ─── Reorder btn & roster panel ─── */
  .reorder-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--muted);font-size:15px;padding:3px 8px;cursor:pointer;transition:all 0.15s;line-height:1;}
  .reorder-btn:hover,.reorder-btn.open{color:var(--accent);border-color:rgba(var(--accent-rgb),0.4);}
  .collapse-btn{background:none;border:none;color:var(--subtle);font-size:13px;cursor:pointer;padding:0 2px;line-height:1;transition:color 0.15s;font-family:var(--font-mono);}
  .collapse-btn:hover{color:var(--muted);}
  .roster-panel{display:none;position:fixed;z-index:100;background:var(--surface-2);border:1px solid rgba(255,255,255,0.14);border-radius:var(--radius);padding:12px 14px;box-shadow:0 8px 32px rgba(0,0,0,0.6);min-width:240px;max-width:320px;}
  .roster-panel.open{display:block;}
  .roster-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .roster-lbl{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;}
  .roster-close{font-family:var(--font-mono);font-size:11px;background:rgba(var(--accent-rgb),0.1);border:1px solid rgba(var(--accent-rgb),0.25);border-radius:4px;color:var(--accent);padding:3px 9px;cursor:pointer;}
  .roster-row{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid var(--border);cursor:grab;user-select:none;touch-action:none;}
  .roster-row:last-child{border-bottom:none;}
  .roster-row.dragging{opacity:0.4;}
  .roster-row.drag-over{border-color:var(--accent);}
  .roster-pos{font-family:var(--font-mono);font-size:11px;color:var(--subtle);width:16px;flex-shrink:0;}
  .roster-name{font-size:13px;color:var(--muted);flex:1;}
  .roster-grip{font-size:16px;color:var(--subtle);letter-spacing:2px;}


  @media(max-width:520px){
    .week-pills{gap:3px;}
    .week-pill,.week-pill-dash{font-size:11px;padding:3px 6px;}
    .day-strip-pill{font-size:11px;padding:4px 8px;}
    .ex-name,.collapse-name{font-size:15px;}
    .muscle-tags{flex-wrap:wrap;}
    .weight-row{flex-wrap:wrap;gap:6px;}
    .mark-all-btn{font-size:11px;}
    .roster-panel{padding:10px 12px;}
    .rep-input{font-size:13px;}
    .reorder-btn,.swap-btn{min-width:34px;min-height:34px;font-size:15px;}
    .header-right{gap:6px;}
  }

/* Warm-up section */
.wu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;position:relative;}
.wu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:rgba(var(--accent-rgb),0.35);border-radius:var(--radius) var(--radius) 0 0;}
.wu-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
.wu-title-wrap{display:flex;align-items:center;gap:8px;}
.wu-lbl{font-family:var(--font-mono);font-size:11px;color:var(--accent);letter-spacing:0.12em;}
.wu-meta{font-family:var(--font-mono);font-size:11px;color:var(--subtle);letter-spacing:0.06em;}
.wu-chevron{font-family:var(--font-mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;line-height:1;pointer-events:none;}
.wu-body{display:none;border-top:1px solid var(--border);padding:6px 14px 10px;}
.wu-body.open{display:block;}
.wu-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.wu-row:last-child{border-bottom:none;}
.wu-info{flex:1;}
.wu-drill-name{font-size:14px;color:var(--text);font-weight:500;line-height:1.2;}
.wu-drill-tag{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:0.07em;margin-top:2px;}
.wu-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;}
.wu-spec{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.wu-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;transition:all 0.15s;flex-shrink:0;background:none;}
.wu-dot:hover{border-color:rgba(var(--accent-rgb),0.4);}
.wu-dot.done{background:var(--accent);border-color:var(--accent);}
/* Delta chip */
.delta-chip{font-family:var(--font-mono);font-size:11px;padding:3px 8px;border-radius:4px;letter-spacing:0.04em;white-space:nowrap;}
.delta-chip.positive{background:rgba(74,222,128,0.1);color:#4ade80;border:1px solid rgba(74,222,128,0.25);}
</style>

  <div class="week-pills">

    <button class="week-pill" data-week="1">WK 1</button>
    <button class="week-pill" data-week="2">WK 2</button>
    <button class="week-pill" data-week="3">WK 3</button>
    <button class="week-pill" data-week="4">WK 4</button>
    <button class="week-pill" data-week="5">WK 5</button>

  </div>
</div>
<div class="page-wrap">
  <a href="index.html" class="back-link">← FORGE Dashboard</a>
  <header class="page-header">

<script>

'use strict';
const EXERCISES = [{"id":"ex1","name":"Incline DB Press","type":"anchor","typeLabel":"PRIMARY \u00b7 ANCHOR","sets":4,"reps":"8-10","baseWeight":65,"delta":2.5,"restSecs":120,"cue":"LEADS every Push day \u2014 upper chest freshest","musclePrimary":"Upper Chest","muscleSecondary":"Front Delt","alternatives":null},{"id":"ex2","name":"Flat DB Press","type":"anchor","typeLabel":"PRIMARY \u00b7 ANCHOR","sets":4,"reps":"8-10","baseWeight":80,"delta":2.5,"restSecs":120,"cue":"Progressive overload \u2014 target 105\u2013110 lbs in 8 wks","musclePrimary":"Chest","muscleSecondary":"Front Delt \u00b7 Triceps","alternatives":null},{"id":"ex3","name":"Cable Crossover","type":"flex","typeLabel":"ISOLATION \u00b7 FLEX","sets":3,"reps":"12-15","baseWeight":30,"delta":0,"restSecs":60,"cue":"Full stretch at bottom \u2014 highest hypertrophy stimulus","musclePrimary":"Inner Chest","muscleSecondary":"","alternatives":[{"name":"Low Cable Fly","tag":"Cable \u00b7 Full pec stretch \u00b7 Constant tension","baseWeight":15},{"name":"Dumbbell Fly","tag":"Dumbbell \u00b7 Deep stretch \u00b7 Chest focus","baseWeight":25},{"name":"Machine Chest Fly","tag":"Machine \u00b7 Guided arc \u00b7 Pec isolation","baseWeight":70}]},{"id":"ex4","name":"Pec Deck Fly","type":"flex","typeLabel":"ISOLATION \u00b7 FLEX","sets":3,"reps":"12-15","baseWeight":50,"delta":0,"restSecs":60,"cue":"Mind-muscle connection \u2014 squeeze, don't just move weight","musclePrimary":"Chest","muscleSecondary":"","alternatives":[{"name":"Incline Cable Fly","tag":"Cable \u00b7 Upper pec isolation \u00b7 Stretch-based","baseWeight":12.5},{"name":"DB Squeeze Press","tag":"Dumbbell \u00b7 Inner chest peak contraction","baseWeight":40},{"name":"Svend Press","tag":"Plate \u00b7 Adduction focus \u00b7 Medial pec","baseWeight":25}]},{"id":"ex5","name":"Tricep Pushdown","type":"flex","typeLabel":"ISOLATION \u00b7 FLEX","sets":4,"reps":"12-15","baseWeight":45,"delta":2.5,"restSecs":60,"cue":"AFTER all pressing \u2014 straight bar, elbows locked","musclePrimary":"Triceps","muscleSecondary":"","alternatives":[{"name":"Rope Pushdown","tag":"Cable \u00b7 Rope \u00b7 Spreading motion at bottom","baseWeight":45},{"name":"V-Bar Pushdown","tag":"Cable \u00b7 V-Bar \u00b7 Standard tricep isolation","baseWeight":45},{"name":"Band Pushdown","tag":"Band \u00b7 Low fatigue \u00b7 High rep finisher","baseWeight":0}]},{"id":"ex6","name":"Overhead Tricep Ext.","type":"flex","typeLabel":"ISOLATION \u00b7 FLEX","sets":3,"reps":"10-12","baseWeight":35,"delta":2.5,"restSecs":60,"cue":"Long head stretch \u2014 keep elbows in tight","musclePrimary":"Triceps Long Head","muscleSecondary":"","alternatives":[{"name":"Cable Overhead Extension","tag":"Cable \u00b7 Constant tension \u00b7 Long head stretch","baseWeight":35},{"name":"DB Overhead Ext.","tag":"Dumbbell \u00b7 Long head stretch \u00b7 Single arm option","baseWeight":30},{"name":"EZ-Bar Skullcrusher","tag":"Barbell \u00b7 Long head focus \u00b7 Elbows in","baseWeight":40}]},{"id":"ex7","name":"Lateral Raise","type":"flex","typeLabel":"ISOLATION \u00b7 FLEX","sets":3,"reps":"15","baseWeight":20,"delta":0,"restSecs":60,"cue":"Medial delt \u2014 light weight, full arc","musclePrimary":"Medial Delt","muscleSecondary":"","alternatives":[{"name":"Cable Lateral Raise","tag":"Cable \u00b7 Constant tension vs dumbbell","baseWeight":10},{"name":"Machine Lateral Raise","tag":"Machine \u00b7 Seated \u00b7 Guided path","baseWeight":25},{"name":"Leaning DB Lateral","tag":"Dumbbell \u00b7 Leaning \u00b7 Greater ROM","baseWeight":12.5}]},{"id":"ex8","name":"Chest Dips","type":"flex","typeLabel":"COMPOUND+ \u00b7 FLEX","sets":3,"reps":"8-10","baseWeight":0,"delta":0,"restSecs":60,"cue":"Burnout finisher \u2014 lean forward for chest emphasis","musclePrimary":"Lower Chest","muscleSecondary":"Triceps","alternatives":[{"name":"Bench Dip","tag":"Bodyweight \u00b7 Tricep focus \u00b7 Low setup","baseWeight":0},{"name":"Machine Dip","tag":"Machine \u00b7 Assisted \u00b7 Controlled ROM","baseWeight":50},{"name":"Decline Push-Up","tag":"Bodyweight \u00b7 Upper chest + tricep","baseWeight":0}]}];
const FLEX_IDS = ["ex3", "ex4", "ex5", "ex6", "ex7", "ex8"];
const STORAGE_KEY = 'forge_wednesday_v1';
const WEEK_SYNC_KEY = 'forge_week_v1';

let state = {};
let currentWeek = 1;
let flexOrder = [];
let restInterval = null;
let restRemaining = 0;
let autoSaveTimer = null;
let dragSrcId = null;

function sanitiseState(raw) {
  if (!raw || typeof raw !== 'object') return {};
  return raw;
}
function calcWeight(ex, week) {
  const ew = week === 7 ? 6 : week;
  const base = (state.baseWeights && state.baseWeights[ex.id] != null) ? state.baseWeights[ex.id] : ex.baseWeight;
  return base + ex.delta * (ew - 1);
}
function parseWeight(v) {
  const n = parseFloat(v);
  if (isNaN(n) || !isFinite(n) || n < 0 || n > 1000) return null;
  return n;
}
function saveState(silent) {
  state.week = currentWeek;
  state.flexOrder = flexOrder.slice();
  state.baseWeights = state.baseWeights || {};
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (!silent) showToast('Saved');
}
function autoSave() { clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(function() { saveState(true); }, 400); }
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}
function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state = sanitiseState(raw);
  } catch(e) { state = {}; }
  state.exercises = state.exercises || {};
  state.baseWeights = state.baseWeights || {};
  state.swaps = state.swaps || {};
  state.swapWeights = state.swapWeights || {};
  try {
    const w = parseInt(localStorage.getItem(WEEK_SYNC_KEY));
    currentWeek = (w >= 1 && w <= 7) ? w : (state.week || 1);
  } catch(e) { currentWeek = state.week || 1; }
  if (state.flexOrder && Array.isArray(state.flexOrder) && state.flexOrder.length === FLEX_IDS.length) {
    flexOrder = state.flexOrder.slice();
  } else {
    flexOrder = FLEX_IDS.slice();
  }
}

function initWeekSync() {
  document.querySelectorAll('.week-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      currentWeek = parseInt(pill.dataset.week);
      try { localStorage.setItem(WEEK_SYNC_KEY, currentWeek); } catch(e) {}
      saveState(true);
      renderAll();
      updateWeekUI();
    });
  });
  updateWeekUI();
}
function updateWeekUI() {
  document.querySelectorAll('.week-pill').forEach(function(p) {
    p.classList.toggle('active', parseInt(p.dataset.week) === currentWeek);
  });
}

/* ─── Rest Timer ─── */
function startRest(secs) {
  clearInterval(restInterval);
  restRemaining = secs;
  const overlay = document.getElementById('rest-overlay');
  const circle = document.getElementById('rest-circle');
  const label = document.getElementById('rest-label');
  const CIRC = 2 * Math.PI * 88;
  if (!overlay) return;
  overlay.classList.add('show');
  function tick() {
    if (label) label.textContent = restRemaining + 's';
    if (circle) circle.style.strokeDashoffset = CIRC * (1 - restRemaining / secs);
    if (restRemaining <= 0) { clearInterval(restInterval); overlay.classList.remove('show'); }
    restRemaining--;
  }
  tick();
  restInterval = setInterval(tick, 1000);
}
function skipRest() { clearInterval(restInterval); const o = document.getElementById('rest-overlay'); if (o) o.classList.remove('show'); }
function addRestTime() { restRemaining += 30; }

/* ─── Day Complete ─── */
function checkDayComplete() {
  const done = EXERCISES.every(function(ex) {
    const s = state.exercises[ex.id];
    return s && s.sets && s.sets.filter(Boolean).length === ex.sets;
  });
  if (done) {
    try {
      const c = JSON.parse(localStorage.getItem('forge_completions_v1') || '{}');
      c[new Date().toISOString().slice(0,10)] = 'lift';
      localStorage.setItem('forge_completions_v1', JSON.stringify(c));
    } catch(e) {}
  }
}

/* ─── Position Picker ─── */
let pickerOpenId = null;
function closeAllPickers() {
  document.querySelectorAll('.pos-picker').forEach(function(p) { p.remove(); });
  pickerOpenId = null;
}
function openPicker(exId, anchorEl) {
  closeAllPickers();
  const idx = flexOrder.indexOf(exId);
  const picker = document.createElement('div');
  picker.className = 'pos-picker';
  const lbl = document.createElement('span');
  lbl.className = 'picker-label';
  lbl.textContent = 'Jump to:';
  picker.appendChild(lbl);
  flexOrder.forEach(function(_, i) {
    const btn = document.createElement('button');
    btn.className = 'picker-pill' + (i === idx ? ' current' : '');
    btn.textContent = String(i + 1);
    btn.addEventListener('click', function(e) { e.stopPropagation(); teleportCard(exId, i); });
    picker.appendChild(btn);
  });
  const parent = anchorEl.closest('.card-header') || anchorEl.parentNode;
  parent.style.position = 'relative';
  parent.appendChild(picker);
  pickerOpenId = exId;
  setTimeout(function() {
    document.addEventListener('click', closeAllPickers, { once: true });
  }, 50);
}
function teleportCard(exId, newIdx) {
  const curr = flexOrder.indexOf(exId);
  if (curr === -1 || curr === newIdx) return;
  flexOrder.splice(curr, 1);
  flexOrder.splice(newIdx, 0, exId);
  closeAllPickers();
  saveState(true);
  renderAll();
}
function moveCard(exId, dir) {
  const idx = flexOrder.indexOf(exId);
  const ni = idx + dir;
  if (ni < 0 || ni >= flexOrder.length) return;
  flexOrder.splice(idx, 1);
  flexOrder.splice(ni, 0, exId);
  saveState(true);
  renderAll();
}

/* ─── Long-press drag setup ─── */

/* ─── Card builder ─── */
function buildCard(ex) {
  const isAnchor = ex.type === 'anchor';
  if (!state.exercises[ex.id]) state.exercises[ex.id] = { sets: new Array(ex.sets).fill(false), reps: [], weight: null };
  const exState = state.exercises[ex.id];
  exState.sets = Array.isArray(exState.sets) ? exState.sets : new Array(ex.sets).fill(false);
  while (exState.sets.length < ex.sets) exState.sets.push(false);
  exState.reps = Array.isArray(exState.reps) ? exState.reps : [];
  const swapIdx = (state.swaps && state.swaps[ex.id]) || 0;
  const swapKey = ex.id + '_sw' + swapIdx;
  let weight;
  if (swapIdx > 0 && state.swapWeights && state.swapWeights[swapKey] != null) {
    weight = state.swapWeights[swapKey];
  } else if (swapIdx > 0 && ex.alternatives && ex.alternatives[swapIdx-1] && ex.alternatives[swapIdx-1].baseWeight) {
    weight = ex.alternatives[swapIdx-1].baseWeight;
    state.swapWeights = state.swapWeights || {};
    state.swapWeights[swapKey] = weight;
  } else {
    weight = calcWeight(ex, currentWeek);
  }
  const displayName = (swapIdx > 0 && ex.alternatives && ex.alternatives[swapIdx - 1]) ? ex.alternatives[swapIdx - 1].name : ex.name;
  const completedSets = exState.sets.filter(Boolean).length;
  const allDone = completedSets === ex.sets;

  const card = document.createElement('div');
  card.className = 'exercise-card ' + (isAnchor ? 'anchor-card' : 'flex-card') + ' collapsed';
  card.id = 'card-' + ex.id;

  

  /* Progress bar */
  const prog = document.createElement('div');
  prog.className = 'card-progress';
  const progFill = document.createElement('div');
  progFill.className = 'card-progress-fill';
  progFill.style.width = (completedSets / ex.sets * 100) + '%';
  prog.appendChild(progFill);
  card.appendChild(prog);

  /* Collapsed row */
  const colRow = document.createElement('div');
  colRow.className = 'collapse-row';
  const colLeft = document.createElement('div');
  colLeft.className = 'collapse-left';
  const colTypeLbl = document.createElement('div');
  colTypeLbl.className = 'type-label';
  colTypeLbl.textContent = ex.typeLabel;
  const colName = document.createElement('div');
  colName.className = 'collapse-name';
  colName.textContent = displayName;
  colLeft.appendChild(colTypeLbl);
  colLeft.appendChild(colName);
  const colRight = document.createElement('div');
  colRight.className = 'collapse-right';
  const colSummaryText = document.createElement('span');
  colSummaryText.className = 'collapse-summary-text';
  function buildSummaryText() {
    const r = exState.reps.find(function(v) { return v && !String(v).startsWith('__auto__'); }) || ex.reps;
    const cr = String(r).replace('__auto__', '');
    return ex.sets + '\u00d7' + cr + (ex.baseWeight > 0 ? ' @ ' + weight + 'lb' : ' BW');
  }
  colSummaryText.textContent = buildSummaryText();
  const colCheck = document.createElement('span');
  colCheck.className = 'collapse-check' + (allDone ? ' done' : '');
  colCheck.textContent = '\u2713';
  colRight.appendChild(colSummaryText);
  colRight.appendChild(colCheck);
  colRow.appendChild(colLeft);
  colRow.appendChild(colRight);
  colRow.addEventListener('click', function() { card.classList.remove('collapsed'); collapseToggleBtn.textContent = '\u25be'; });
  card.appendChild(colRow);

  /* Inner */
  const inner = document.createElement('div');
  inner.className = 'card-inner';

  /* Header */
  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  const hLeft = document.createElement('div');
  hLeft.className = 'header-left';
  const typeLbl = document.createElement('div');
  typeLbl.className = 'type-label';
  typeLbl.textContent = ex.typeLabel;
  const exNameEl = document.createElement('div');
  exNameEl.className = 'ex-name';
  exNameEl.textContent = displayName;
  hLeft.appendChild(typeLbl);
  hLeft.appendChild(exNameEl);
  const collapseToggleBtn = document.createElement('button');
  collapseToggleBtn.className = 'collapse-btn';
  collapseToggleBtn.textContent = '\u25b8';
  collapseToggleBtn.title = 'Collapse card';
  collapseToggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    const willCollapse = !card.classList.contains('collapsed');
    card.classList.toggle('collapsed');
    collapseToggleBtn.textContent = willCollapse ? '\u25b8' : '\u25be';
    if (willCollapse) { colSummaryText.textContent = buildSummaryText(); }
  });
  hLeft.appendChild(collapseToggleBtn);
  const hRight = document.createElement('div');
  hRight.className = 'header-right';
  hRight.style.position = 'relative';

  /* Reorder btn */
  if (!isAnchor) {
    const reorderBtn = document.createElement('button');
    reorderBtn.className = 'reorder-btn';
    reorderBtn.textContent = '\u21c5';
    reorderBtn.title = 'Reorder exercises';
    reorderBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const panel = document.getElementById('roster-panel');
      if (!panel) return;
      const willOpen = !panel.classList.contains('open');
      if (willOpen) {
        renderRosterPanel();
        const rect = reorderBtn.getBoundingClientRect();
        const panelW = 280;
        let left = rect.right - panelW;
        if (left < 8) left = 8;
        let top = rect.bottom + 6;
        if (top + 320 > window.innerHeight) top = rect.top - 320 - 6;
        panel.style.left = left + 'px';
        panel.style.top = top + 'px';
        panel.style.width = panelW + 'px';
        panel.classList.add('open');
        reorderBtn.classList.add('open');
      } else {
        panel.classList.remove('open');
        reorderBtn.classList.remove('open');
      }
    });
    hRight.appendChild(reorderBtn);
  }

  /* Swap btn */
  if (!isAnchor && ex.alternatives && ex.alternatives.length > 0) {
    const swapBtn = document.createElement('button');
    swapBtn.className = 'swap-btn';
    swapBtn.textContent = '\u21c4';
    swapBtn.title = 'Swap exercise';
    swapBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const drawer = card.querySelector('.swap-drawer');
      if (drawer) drawer.classList.toggle('open');
    });
    hRight.appendChild(swapBtn);
  }

  

  /* Muscle tags */
  const tags = document.createElement('div');
  tags.className = 'muscle-tags';
  const tagP = document.createElement('span');
  tagP.className = 'muscle-tag primary';
  tagP.textContent = ex.musclePrimary;
  tags.appendChild(tagP);
  if (ex.muscleSecondary && ex.muscleSecondary.trim() !== '' && ex.muscleSecondary !== '\u2014') {
    const tagS = document.createElement('span');
    tagS.className = 'muscle-tag secondary';
    tagS.textContent = ex.muscleSecondary;
    tags.appendChild(tagS);
  }
  hRight.appendChild(tags);
  hdr.appendChild(hLeft);
  hdr.appendChild(hRight);
  inner.appendChild(hdr);

  /* Cue */
  const cueEl = document.createElement('div');
  cueEl.className = 'cue';
  cueEl.textContent = ex.cue;
  inner.appendChild(cueEl);

  /* Tempo badge */
  if (ex.tempo) {
    const tb = document.createElement('div');
    tb.className = 'tempo-badge';
    tb.textContent = ex.tempo.down + ' down \u00b7 ' + ex.tempo.pause + ' pause \u00b7 ' + ex.tempo.up + ' up';
    inner.appendChild(tb);
  }

  /* Weight row */
  const wRow = document.createElement('div');
  wRow.className = 'weight-row';
  const wLbl = document.createElement('span');
  wLbl.className = 'weight-label';
  wLbl.textContent = 'WEIGHT';
  wRow.appendChild(wLbl);
  if (ex.baseWeight > 0) {
    const wIn = document.createElement('input');
    wIn.type = 'number';
    wIn.className = 'weight-input';
    wIn.min = '0'; wIn.max = '999'; wIn.step = '2.5';
    wIn.value = String(weight);
    wIn.addEventListener('input', function() {
      const v = parseWeight(wIn.value);
      if (v === null) return;
      const ew = currentWeek === 7 ? 6 : currentWeek;
      state.baseWeights = state.baseWeights || {};
      state.baseWeights[ex.id] = v - ex.delta * (ew - 1);
      if (!state.exercises[ex.id]) state.exercises[ex.id] = {};
      state.exercises[ex.id].weight = v;
      if (swapIdx > 0) { state.swapWeights = state.swapWeights || {}; state.swapWeights[swapKey] = v; }
      autoSave();
    });
    wRow.appendChild(wIn);
  } else {
    const bwLbl = document.createElement('span');
    bwLbl.style.fontFamily = 'var(--font-mono)'; bwLbl.style.fontSize = '12px'; bwLbl.style.color = 'var(--muted)';
    bwLbl.textContent = 'Bodyweight';
    wRow.appendChild(bwLbl);
  }
  if (swapIdx === 0 && ex.delta > 0 && currentWeek > 1) {
    const effWk = currentWeek === 7 ? 6 : currentWeek;
    const chipVal = ex.delta * (effWk - 1);
    if (chipVal > 0) {
      const dChip = document.createElement('div');
      dChip.className = 'delta-chip positive';
      dChip.textContent = '\u2191 +' + chipVal + ' lbs vs WK1';
      wRow.appendChild(dChip);
    }
  }
  const markAllBtn = document.createElement('button');
  markAllBtn.className = 'mark-all-btn';
  markAllBtn.textContent = exState.sets.every(Boolean) ? 'Undo All' : 'Mark All';
  markAllBtn.addEventListener('click', function() {
    const newVal = !exState.sets.every(Boolean);
    exState.sets = new Array(ex.sets).fill(newVal);
    autoSave();
    renderAll();
    if (newVal) checkDayComplete();
  });
  wRow.appendChild(markAllBtn);
  inner.appendChild(wRow);

  /* Sets grid */
  const sGrid = document.createElement('div');
  sGrid.className = 'sets-grid';
  const hRow = document.createElement('div');
  hRow.className = 'set-row set-header';
  ['#','Reps','\u2714'].forEach(function(txt, i) {
    const s = document.createElement('span');
    s.className = ['set-num-lbl','set-reps-lbl','set-dot-lbl'][i];
    s.textContent = txt;
    hRow.appendChild(s);
  });
  sGrid.appendChild(hRow);

  for (let i = 0; i < ex.sets; i++) {
    const row = document.createElement('div');
    row.className = 'set-row';
    const num = document.createElement('span');
    num.className = 'set-num';
    num.textContent = String(i + 1);

    /* Rep input */
    const rIn = document.createElement('input');
    rIn.type = 'number';
    rIn.className = 'rep-input';
    rIn.placeholder = ex.reps;
    rIn.min = '1'; rIn.max = '60'; rIn.step = '1';
    rIn.setAttribute('data-set', String(i));
    rIn.setAttribute('data-exid', ex.id);
    const savedRep = exState.reps[i];
    if (savedRep) {
      if (String(savedRep).startsWith('__auto__')) {
        rIn.value = String(savedRep).replace('__auto__', '');
        rIn.classList.add('autofilled');
      } else {
        rIn.value = String(savedRep);
        rIn.classList.add('logged');
        rIn.setAttribute('data-user-typed', '1');
      }
    }
    rIn.addEventListener('input', function() {
      const val = rIn.value.trim();
      if (!val) {
        exState.reps[i] = '';
        rIn.classList.remove('logged', 'autofilled');
        delete rIn.dataset.userTyped;
      } else {
        exState.reps[i] = val;
        rIn.classList.add('logged');
        rIn.classList.remove('autofilled');
        rIn.setAttribute('data-user-typed', '1');
        if (i === 0) {
          for (let j = 1; j < ex.sets; j++) {
            const nxt = card.querySelector('[data-exid="' + ex.id + '"][data-set="' + j + '"]');
            if (nxt && !nxt.getAttribute('data-user-typed') && (!exState.reps[j] || String(exState.reps[j]).startsWith('__auto__'))) {
              nxt.value = val;
              nxt.classList.add('autofilled');
              nxt.classList.remove('logged');
              exState.reps[j] = '__auto__' + val;
            }
          }
        }
      }
      autoSave();
    });

    /* Set dot */
    const dot = document.createElement('button');
    dot.className = 'set-dot' + (exState.sets[i] ? ' done' : '');
    dot.setAttribute('aria-label', 'Set ' + (i + 1));
    dot.addEventListener('click', function() {
      const prevDone = exState.sets.filter(Boolean).length;
      let newCount;
      if (exState.sets[i]) {
        newCount = i;
      } else {
        newCount = i + 1;
      }
      exState.sets = new Array(ex.sets).fill(false).map(function(_, k) { return k < newCount; });
      autoSave();
      progFill.style.width = (exState.sets.filter(Boolean).length / ex.sets * 100) + '%';
      card.querySelectorAll('.set-dot').forEach(function(d, k) { d.classList.toggle('done', exState.sets[k]); });
      card.querySelectorAll('.rep-input').forEach(function(ri, k) {
        if (exState.sets[k]) { ri.classList.add('logged'); ri.classList.remove('autofilled'); }
        else if (!ri.getAttribute('data-user-typed')) { ri.classList.remove('logged'); }
      });
      markAllBtn.textContent = exState.sets.every(Boolean) ? 'Undo All' : 'Mark All';
      if (exState.sets.filter(Boolean).length > prevDone) startRest(ex.restSecs);
      if (exState.sets.every(Boolean)) {
        checkDayComplete();
        colSummaryText.textContent = buildSummaryText();
        colCheck.classList.add('done');
        setTimeout(function() { card.classList.add('collapsed'); }, 400);
      } else {
        card.classList.remove('collapsed');
        colCheck.classList.remove('done');
      }
    });

    row.appendChild(num);
    row.appendChild(rIn);
    row.appendChild(dot);
    sGrid.appendChild(row);
  }
  inner.appendChild(sGrid);

  /* Swap drawer */
  if (!isAnchor && ex.alternatives && ex.alternatives.length > 0) {
    const drawer = document.createElement('div');
    drawer.className = 'swap-drawer';
    drawer.id = 'swap-' + ex.id;
    const dLbl = document.createElement('div');
    dLbl.className = 'swap-drawer-label';
    dLbl.textContent = 'SELECT REPLACEMENT — SAME MUSCLE GROUP';
    drawer.appendChild(dLbl);
    function makeCardOpt(name, tag, idx) {
      const opt = document.createElement('div');
      opt.className = 'swap-option' + (swapIdx === idx ? ' selected' : '');
      const info = document.createElement('div');
      const nm = document.createElement('div');
      nm.className = 'swap-opt-name';
      nm.textContent = name;
      const tg = document.createElement('div');
      tg.className = 'swap-opt-tag';
      tg.textContent = tag;
      info.appendChild(nm);
      info.appendChild(tg);
      const pill = document.createElement('div');
      pill.className = 'swap-select-pill';
      pill.textContent = swapIdx === idx ? 'ACTIVE' : 'SELECT';
      opt.appendChild(info);
      opt.appendChild(pill);
      opt.addEventListener('click', function() {
        state.swaps = state.swaps || {};
        state.swaps[ex.id] = idx;
        if (idx > 0 && ex.alternatives[idx-1]) {
          const sk = ex.id + '_sw' + idx;
          state.swapWeights = state.swapWeights || {};
          if (state.swapWeights[sk] == null) {
            state.swapWeights[sk] = ex.alternatives[idx-1].baseWeight || calcWeight(ex, currentWeek);
          }
        }
        autoSave();
        renderAll();
      });
      return opt;
    }
    drawer.appendChild(makeCardOpt('Default: ' + ex.name, 'Default — programmed exercise', 0));
    ex.alternatives.forEach(function(alt, ai) {
      drawer.appendChild(makeCardOpt(alt.name, alt.tag, ai + 1));
    });
    hRight.appendChild(drawer);
  }

  card.appendChild(inner);
  return card;
}

/* ─── Roster panel ─── */
function renderRosterPanel() {
  const list = document.getElementById('roster-list');
  if (!list) return;
  list.innerHTML = '';
  flexOrder.forEach(function(eid, i) {
    const ex = EXERCISES.find(function(e) { return e.id === eid; });
    if (!ex) return;
    const swapIdx = (state.swaps && state.swaps[ex.id]) || 0;
    const displayName = (swapIdx > 0 && ex.alternatives && ex.alternatives[swapIdx-1]) ? ex.alternatives[swapIdx-1].name : ex.name;
    const row = document.createElement('div');
    row.className = 'roster-row';
    row.setAttribute('draggable', 'true');
    row.setAttribute('data-eid', eid);
    row.innerHTML = '<span class="roster-pos">' + (i+1) + '</span><span class="roster-name">' + displayName + '</span><span class="roster-grip">\u283f</span>';
    row.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text/plain', eid); row.classList.add('dragging'); });
    row.addEventListener('dragend', function() { row.classList.remove('dragging'); });
    row.addEventListener('dragover', function(e) { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', function() { row.classList.remove('drag-over'); });
    row.addEventListener('drop', function(e) {
      e.preventDefault(); row.classList.remove('drag-over');
      const fromId = e.dataTransfer.getData('text/plain');
      const toId = eid;
      if (fromId === toId) return;
      const fi = flexOrder.indexOf(fromId), ti = flexOrder.indexOf(toId);
      flexOrder.splice(fi, 1); flexOrder.splice(ti, 0, fromId);
      autoSave(); renderAll(); renderRosterPanel();
    });
    list.appendChild(row);
  });
}

/* ─── Render ─── */
function renderAll() {
  const aZone = document.getElementById('anchor-zone');
  const fZone = document.getElementById('flex-zone');
  if (!aZone || !fZone) return;
  aZone.innerHTML = '';
  fZone.innerHTML = '';
  EXERCISES.filter(function(e) { return e.type === 'anchor'; }).forEach(function(ex) {
    aZone.appendChild(buildCard(ex));
  });
  flexOrder.forEach(function(eid) {
    const ex = EXERCISES.find(function(e) { return e.id === eid; });
    if (ex) fZone.appendChild(buildCard(ex));
  });
}

/* ─── Init ─── */
const WARMUP_TIME = '~6 min';
const WARMUP_DRILLS = [
  {name:'Wrist Circles',tag:'WRIST HEALTH · ELBOW PREP',spec:'30 sec each'},
  {name:'Elbow Circles',tag:'ELBOW HEALTH · JOINT PRIMING',spec:'30 sec each'},
  {name:'Band Pull-Apart',tag:'SHOULDER HEALTH · ROTATOR CUFF',spec:'2×15'},
  {name:'External Rotation',tag:'ROTATOR CUFF · INJURY PREVENTION',spec:'2×15 each'},
  {name:'Thoracic Rotation',tag:'THORACIC SPINE · PRESSING PREP',spec:'10 each'},
  {name:'Isometric Tricep Pushdown',tag:'ELBOW TENDON · PRESSING PREP',spec:'3×10s hold'},
];

function renderWarmup() {
  var container = document.getElementById('warmup-zone');
  if (!container) return;
  container.innerHTML = '';
  var card = document.createElement('div');
  card.className = 'wu-card';
  var isOpen = false;
  var hdr = document.createElement('div');
  hdr.className = 'wu-header';
  var titleWrap = document.createElement('div');
  titleWrap.className = 'wu-title-wrap';
  var lbl = document.createElement('span');
  lbl.className = 'wu-lbl';
  lbl.textContent = 'WARM-UP';
  var meta = document.createElement('span');
  meta.className = 'wu-meta';
  meta.textContent = WARMUP_DRILLS.length + ' DRILLS · ' + WARMUP_TIME;
  titleWrap.appendChild(lbl);
  titleWrap.appendChild(meta);
  var chev = document.createElement('button');
  chev.className = 'wu-chevron';
  chev.id = 'wu-chevron';
  chev.textContent = '\u25b8';
  hdr.appendChild(titleWrap);
  hdr.appendChild(chev);
  var body = document.createElement('div');
  body.className = 'wu-body';
  WARMUP_DRILLS.forEach(function(drill) {
    var row = document.createElement('div');
    row.className = 'wu-row';
    var info = document.createElement('div');
    info.className = 'wu-info';
    var nm = document.createElement('div');
    nm.className = 'wu-drill-name';
    nm.textContent = drill.name;
    var tg = document.createElement('div');
    tg.className = 'wu-drill-tag';
    tg.textContent = drill.tag;
    info.appendChild(nm);
    info.appendChild(tg);
    var right = document.createElement('div');
    right.className = 'wu-right';
    var spec = document.createElement('span');
    spec.className = 'wu-spec';
    spec.textContent = drill.spec;
    var dot = document.createElement('button');
    dot.className = 'wu-dot';
    dot.setAttribute('aria-label', drill.name + ' complete');
    dot.addEventListener('click', function(e) { e.stopPropagation(); dot.classList.toggle('done'); });
    right.appendChild(spec);
    right.appendChild(dot);
    row.appendChild(info);
    row.appendChild(right);
    body.appendChild(row);
  });
  hdr.addEventListener('click', function() {
    isOpen = !isOpen;
    body.classList.toggle('open', isOpen);
    chev.textContent = isOpen ? '\u25be' : '\u25b8';
  });
  card.appendChild(hdr);
  card.appendChild(body);
  container.appendChild(card);
}

document.addEventListener('DOMContentLoaded', function() {
  loadState();
  initWeekSync();
  renderAll();
  renderWarmup();

  /* Close roster panel on outside click */
  document.addEventListener('click', function(e) {
    const panel = document.getElementById('roster-panel');
    if (panel && panel.classList.contains('open')) {
      if (!panel.contains(e.target) && !e.target.closest('.reorder-btn')) {
        panel.classList.remove('open');
        document.querySelectorAll('.reorder-btn').forEach(function(b) { b.classList.remove('open'); });
      }
    }
  });

  /* Rest overlay btns */
  const skipBtn = document.getElementById('rest-skip');
  if (skipBtn) skipBtn.addEventListener('click', skipRest);
  const addBtn = document.getElementById('rest-add');
  if (addBtn) addBtn.addEventListener('click', addRestTime);

  /* Reset btn */
  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) {
    resetBtn.addEventListener('click', function() {
      if (!confirm('Reset all session data for today?')) return;
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
      loadState();
      renderAll();
      showToast('Session reset');
    });
  }
});
